services:
  db:
    image: postgres:16-alpine
    container_name: inventary_postgres
    environment:
      POSTGRES_DB: inventary_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - inventary_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventary_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: inventary_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/inventary_db
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    container_name: inventary_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  inventary_postgres_data:
